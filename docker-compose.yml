services:
  app:
    image: olx-app-dev:latest
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: outcome_exchange_app
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-exchange}
      DB_PASSWORD: ${DB_PASSWORD:-exchange}
      DB_NAME: ${DB_NAME:-exchange}
      DB_SSL: ${DB_SSL:-false}
      DB_SSL_REJECT_UNAUTHORIZED: ${DB_SSL_REJECT_UNAUTHORIZED:-true}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AUTH_USER_CACHE_TTL_SECONDS: ${AUTH_USER_CACHE_TTL_SECONDS:-10}
      JWT_SECRET: ${JWT_SECRET:-dev-only-change-this-secret-1234567890}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-true}
      HTTP_ALLOWED_ORIGINS: ${HTTP_ALLOWED_ORIGINS:-http://localhost:3001}
      WS_ALLOWED_ORIGINS: ${WS_ALLOWED_ORIGINS:-http://localhost:3001}
    ports:
      - "3000:3000"
    command: >
      sh -lc "
      pnpm install --frozen-lockfile --filter .;
      pnpm run start:dev
      "
    volumes:
      - .:/usr/src/app
      - app_node_modules:/usr/src/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  web:
    image: olx-web-dev:latest
    build:
      context: .
      dockerfile: Dockerfile
      target: web-development
    container_name: outcome_exchange_web
    environment:
      NODE_ENV: development
      CI: "true"
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3000/api}
      NEXT_PUBLIC_WS_BASE_URL: ${NEXT_PUBLIC_WS_BASE_URL:-http://localhost:3000}
    ports:
      - "3001:3000"
    command: >
      sh -lc "
      pnpm --dir /usr/src/app/apps/web install --frozen-lockfile --config.confirmModulesPurge=false &&
      pnpm --dir /usr/src/app/apps/web run dev --hostname 0.0.0.0 --port 3000
      "
    depends_on:
      app:
        condition: service_healthy
    volumes:
      - .:/usr/src/app
      - ./node_modules:/usr/src/app/node_modules
      - ./apps/web/node_modules:/usr/src/app/apps/web/node_modules
      - web_next_cache:/usr/src/app/apps/web/.next
    restart: unless-stopped

  postgres:
    image: postgres:18.3-alpine
    container_name: outcome_exchange_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-exchange}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-exchange}
      POSTGRES_DB: ${DB_NAME:-exchange}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-exchange} -d ${DB_NAME:-exchange}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:8.6-alpine
    container_name: outcome_exchange_redis
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  app_node_modules:
    name: olx_app_node_modules
  web_next_cache:
    name: olx_web_next_cache
